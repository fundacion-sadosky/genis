    location = /matching-profile {
      proxy_pass http://host.docker.internal:9001/api/v2/matching-profile;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # Scenarios
    # -------------------------------------------------------------------------
    location = /default-scenario {
      proxy_pass http://host.docker.internal:9001/api/v2/default-scenario;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /matchesForScenario {
      proxy_pass http://host.docker.internal:9001/api/v2/matchesForScenario;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/scenarios {
      rewrite ^/scenarios(.*)$ /api/v2/scenarios$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
