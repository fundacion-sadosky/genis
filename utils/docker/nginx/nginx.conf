# =============================================================================
# HOW TO MIGRATE AN ENDPOINT FROM LEGACY TO CORE (v2)
# -----------------------------------------------------------------------------
# 1. Make sure the endpoint is implemented in modules/core and running on :9001
# 2. Add a location block ABOVE the "Fallback" section, before "location /":
#
#      location = /your-path {
#        proxy_pass http://host.docker.internal:9001/api/v2/your-path;
#        proxy_set_header Host            $host;
#        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#      }
#
# 3. Apply the change: docker compose restart nginx  (from utils/docker/)
# 4. Test the endpoint. If something breaks, remove the block and restart.
# =============================================================================
# COMO MIGRAR UN ENDPOINT DE LEGACY A CORE (v2)
# -----------------------------------------------------------------------------
# 1. Asegurate de que el endpoint este implementado en modules/core y corriendo en :9001
# 2. Agrega un bloque location ANTES de la seccion "Fallback", antes de "location /":
#
#      location = /tu-ruta {
#        proxy_pass http://host.docker.internal:9001/api/v2/tu-ruta;
#        proxy_set_header Host            $host;
#        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#      }
#
# 3. Aplica el cambio: docker compose restart nginx  (desde utils/docker/)
# 4. Proba el endpoint. Si algo falla, borra el bloque y reinicia.
# =============================================================================

events {}

http {
  server {
    listen 80;

    # =========================================================================
    # Endpoints migrados a core (Play 3, :9001, /api/v2/*)
    # Para rutas con URL distinta entre legacy y modern, se usa rewrite especifico.
    # =========================================================================

    # -------------------------------------------------------------------------
    # Disclaimer
    # -------------------------------------------------------------------------
    location = /disclaimer {
      proxy_pass http://host.docker.internal:9001/api/v2/disclaimer;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # Autenticacion
    # -------------------------------------------------------------------------
    location = /login {
      proxy_pass http://host.docker.internal:9001/api/v2/login;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # Notificaciones (SSE y CRUD)
    # -------------------------------------------------------------------------
    location = /match-notifications {
      proxy_pass http://host.docker.internal:9001/api/v2/match-notifications;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_buffering off;
      proxy_cache    off;
    }

    location ~ ^/notifications {
      rewrite ^/notifications(.*)$ /api/v2/notifications$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_buffering off;
      proxy_cache    off;
    }

    # -------------------------------------------------------------------------
    # Tipos de delito y material biologico
    # -------------------------------------------------------------------------
    location = /crimeTypes {
      proxy_pass http://host.docker.internal:9001/api/v2/crimeTypes;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/bioMaterialTypes {
      rewrite ^/bioMaterialTypes(.*)$ /api/v2/bioMaterialTypes$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # Frecuencia base poblacional
    # -------------------------------------------------------------------------
    location ~ ^/populationBaseFreq {
      rewrite ^/populationBaseFreq(.*)$ /api/v2/populationBaseFreq$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # Auditoria (Operation Logs)
    # -------------------------------------------------------------------------
    location ~ ^/operationLog {
      rewrite ^/operationLog(.*)$ /api/v2/operationLog$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # Laboratorios y geneticistas
    # -------------------------------------------------------------------------
    location ~ ^/laboratory {
      rewrite ^/laboratory(.*)$ /api/v2/laboratory$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /country {
      proxy_pass http://host.docker.internal:9001/api/v2/country;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/provinces {
      rewrite ^/provinces(.*)$ /api/v2/provinces$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/geneticist {
      rewrite ^/geneticist(.*)$ /api/v2/geneticist$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # STR Kits
    # Nota: /strkit/* (legacy) usa URLs distintas a /api/v2/strkits (modern)
    # -------------------------------------------------------------------------
    location ~ ^/strkits {
      rewrite ^/strkits(.*)$ /api/v2/strkits$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Legacy: POST /strkit/create -> modern: POST /api/v2/strkits
    location = /strkit/create {
      proxy_pass http://host.docker.internal:9001/api/v2/strkits;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Legacy: PUT /strkit/update -> modern: PUT /api/v2/strkits
    location = /strkit/update {
      proxy_pass http://host.docker.internal:9001/api/v2/strkits;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Legacy: GET /strkit/export -> modern: GET /api/v2/strkits/export
    location = /strkit/export {
      proxy_pass http://host.docker.internal:9001/api/v2/strkits/export;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Legacy: POST /strkit/import -> modern: POST /api/v2/strkits/import
    location = /strkit/import {
      proxy_pass http://host.docker.internal:9001/api/v2/strkits/import;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Legacy: DELETE /strkit/delete/:id -> modern: DELETE /api/v2/strkits/:id
    location ~ ^/strkit/delete/(.+)$ {
      proxy_pass http://host.docker.internal:9001/api/v2/strkits/$1;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # Motivos
    # -------------------------------------------------------------------------
    location ~ ^/motive {
      rewrite ^/motive(.*)$ /api/v2/motive$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # Usuarios
    # Nota: /signup y /clear-password cambiaron a /api/v2/user/* en modern
    # -------------------------------------------------------------------------
    location ~ ^/users {
      rewrite ^/users(.*)$ /api/v2/users$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/signup {
      rewrite ^/signup(.*)$ /api/v2/user/signup$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/clear-password {
      rewrite ^/clear-password(.*)$ /api/v2/user/clear-password$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # Roles y permisos
    # Nota: /permissions, /permissionsfull, /operations cambiaron de URL en modern
    # -------------------------------------------------------------------------

    # Legacy: GET /permissions -> modern: GET /api/v2/roles/permissions
    location = /permissions {
      proxy_pass http://host.docker.internal:9001/api/v2/roles/permissions;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Legacy: GET /permissionsfull -> modern: GET /api/v2/roles/permissions/full
    location = /permissionsfull {
      proxy_pass http://host.docker.internal:9001/api/v2/roles/permissions/full;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Legacy: GET /operations -> modern: GET /api/v2/roles/operations
    location = /operations {
      proxy_pass http://host.docker.internal:9001/api/v2/roles/operations;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/roles {
      rewrite ^/roles(.*)$ /api/v2/roles$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /rolesForSU {
      proxy_pass http://host.docker.internal:9001/api/v2/rolesForSU;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # Perfiles geneticos
    # -------------------------------------------------------------------------
    location ~ ^/profiles {
      rewrite ^/profiles(.*)$ /api/v2/profiles$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/profile-export {
      rewrite ^/profile-export(.*)$ /api/v2/profile-export$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/get-profile-export {
      rewrite ^/get-profile-export(.*)$ /api/v2/get-profile-export$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /get-alta-file-export {
      proxy_pass http://host.docker.internal:9001/api/v2/get-alta-file-export;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /get-match-file-export {
      proxy_pass http://host.docker.internal:9001/api/v2/get-match-file-export;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # Probabilidad (LR-mix)
    # -------------------------------------------------------------------------
    location = /lr-mix {
      proxy_pass http://host.docker.internal:9001/api/v2/lr-mix;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # Categorias
    # Nota: varios paths cambiaron de estructura entre legacy y modern.
    # Se usan alias en modules/core/conf/routes para que los rewrites sean simples.
    # -------------------------------------------------------------------------

    # Paths especificos ANTES del catch-all ~ ^/categories

    # Legacy: GET /categories/export -> modern: GET /api/v2/export/categories
    location = /categories/export {
      proxy_pass http://host.docker.internal:9001/api/v2/export/categories;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Legacy: POST /categories/import -> modern: POST /api/v2/import/categories
    location = /categories/import {
      proxy_pass http://host.docker.internal:9001/api/v2/import/categories;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Legacy: PUT /categories/:catId/details -> modern: PUT /api/v2/categories/full/:catId
    location ~ ^/categories/([^/]+)/details$ {
      proxy_pass http://host.docker.internal:9001/api/v2/categories/full/$1;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Legacy: GET /categories -> list (modern /full); POST/PUT/DELETE /categories -> /api/v2/categories
    location = /categories {
      set $target "http://host.docker.internal:9001/api/v2/categories/full";
      if ($request_method != GET) {
        set $target "http://host.docker.internal:9001/api/v2/categories";
      }
      proxy_pass $target;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Legacy: GET /categoryTree -> modern: GET /api/v2/categories
    location = /categoryTree {
      proxy_pass http://host.docker.internal:9001/api/v2/categories;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Legacy: GET /categoriesWithProfiles -> modern: GET /api/v2/categories/withProfiles
    location = /categoriesWithProfiles {
      proxy_pass http://host.docker.internal:9001/api/v2/categories/withProfiles;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Legacy: GET /categoryTreeManualLoading -> modern: GET /api/v2/categories/manualLoading
    location = /categoryTreeManualLoading {
      proxy_pass http://host.docker.internal:9001/api/v2/categories/manualLoading;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # /categories/:catId (PUT, DELETE) -> /api/v2/categories/:catId
    location ~ ^/categories {
      rewrite ^/categories(.*)$ /api/v2/categories$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # catmodification (alias en routes con query params, rewrite simple)
    location ~ ^/catmodification {
      rewrite ^/catmodification(.*)$ /api/v2/catmodification$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # catmodifications (alias en routes, rewrite simple)
    location ~ ^/catmodifications {
      rewrite ^/catmodifications(.*)$ /api/v2/catmodifications$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # categories-mapping (alias en routes con PUT, rewrite simple)
    location ~ ^/categories-mapping {
      rewrite ^/categories-mapping(.*)$ /api/v2/categories-mapping$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # category-* exports (alias en routes, rewrite simple)
    location ~ ^/category- {
      rewrite ^/category-(.*)$ /api/v2/category-$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # Grupos (legacy /group -> modern /api/v2/groups)
    # Nota: /group/import NO esta migrado (sin implementacion en modern)
    # -------------------------------------------------------------------------

    # Legacy: GET /group/export -> modern: GET /api/v2/groups (exportGroups)
    location = /group/export {
      proxy_pass http://host.docker.internal:9001/api/v2/groups;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Legacy: POST/PUT/DELETE /group/* -> modern: /api/v2/groups/*
    location ~ ^/group {
      rewrite ^/group(.*)$ /api/v2/groups$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # Superior / Inferior / Interconnections
    # -------------------------------------------------------------------------
    location = /superior/category-tree-combo {
      proxy_pass http://host.docker.internal:9001/api/v2/categories/combo;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/superior {
      rewrite ^/superior(.*)$ /api/v2/superior$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/inferior {
      rewrite ^/inferior(.*)$ /api/v2/inferior$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/connections {
      rewrite ^/connections(.*)$ /api/v2/connections$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/instances {
      rewrite ^/instances(.*)$ /api/v2/instances$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/intercon {
      rewrite ^/intercon(.*)$ /api/v2/intercon$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------------------------
    # Matching
    # -------------------------------------------------------------------------
    location = /matching {
      proxy_pass http://host.docker.internal:9001/api/v2/matching;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/user-matches {
      rewrite ^/user-matches(.*)$ /api/v2/user-matches$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /user-total-matches {
      proxy_pass http://host.docker.internal:9001/api/v2/user-total-matches;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /user-matches-group {
      proxy_pass http://host.docker.internal:9001/api/v2/user-matches-group;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /user-total-matches-group {
