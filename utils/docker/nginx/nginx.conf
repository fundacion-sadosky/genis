      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /mixture/compare {
      proxy_pass http://host.docker.internal:9001/api/v2/mixture/compare;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /convertHit {
      proxy_pass http://host.docker.internal:9001/api/v2/convertHit;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /convertDiscard {
      proxy_pass http://host.docker.internal:9001/api/v2/convertDiscard;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /uploadStatus {
      proxy_pass http://host.docker.internal:9001/api/v2/uploadStatus;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /canUploadMatchStatus {
      proxy_pass http://host.docker.internal:9001/api/v2/canUploadMatchStatus;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /getByMatchedProfileId {
      proxy_pass http://host.docker.internal:9001/api/v2/getByMatchedProfileId;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /lr {
      proxy_pass http://host.docker.internal:9001/api/v2/lr;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /collapsing/partial {
      proxy_pass http://host.docker.internal:9001/api/v2/collapsing/partial;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ ^/masiveDiscard {
      rewrite ^/masiveDiscard(.*)$ /api/v2/masiveDiscard$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
