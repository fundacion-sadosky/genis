    # -------------------------------------------------------------------------
    # Pedigrees
    # -------------------------------------------------------------------------
    location ~ ^/pedigree {
      rewrite ^/pedigree(.*)$ /api/v2/pedigree$1 break;
      proxy_pass http://host.docker.internal:9001;
      proxy_set_header Host            $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
