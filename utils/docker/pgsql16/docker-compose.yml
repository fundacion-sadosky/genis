services:
  postgres:
    image: postgres:16.6-alpine
    container_name: genis_pgsql16
    restart: always
    environment:
      - POSTGRES_USER=genis
      - POSTGRES_PASSWORD=genis123
      - POSTGRES_DB=genis
      - POSTGRES_INITDB_ARGS=--auth=md5
    ports:
      - "5433:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genis -d genis"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - genis_network

  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: genis_pgadmin
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@genis.local
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - genis_network

volumes:
  pgadmin_data:
    driver: local

networks:
  genis_network:
    driver: bridge
