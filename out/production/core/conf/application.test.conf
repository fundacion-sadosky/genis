# Test configuration — overrides application.conf for testing
# Services externos desactivados / stubbed

# Secret de prueba (no importa el valor en tests)
play.http.secret.key = "test-secret-key-not-for-production"

# No inicializar módulos que requieren conexiones externas
play.modules.enabled -= "user.UsersModule"
play.modules.enabled -= "security.SecurityModule"
play.modules.enabled += "security.TestSecurityModule"

# DB apagada en tests unitarios
slick.dbs.default.db.url = "jdbc:h2:mem:test;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1"
slick.dbs.default.db.driver = "org.h2.Driver"
slick.dbs.default.profile = "slick.jdbc.H2Profile$"

# Security params (necesarios para que los Guice bindings resuelvan)
rsa.keyLength = 2048
token.expirationTime = 60
credentials.expirationTime = 3600
otp.interval = 30
otp.futures = 1
otp.pasts = 1

# LDAP apuntando a localhost (no se va a usar en tests unitarios)
ldap.default {
  url = "localhost"
  port = 1389
  bindingPool.size = 1
  usersDn = "ou=Users,dc=genis,dc=local"
  rolesDn = "ou=Roles,dc=genis,dc=local"
}
