# Application configuration for Core module

# This is the main configuration file for the Core application (Scala 3 + Play 3).
# It uses HOCON format

# Play HTTP settings
play.http {
  secret.key = "tkk0ec;qptpxoE^t=VSyD[V8@ZvCB_q=M7jsnXh:6Ia?<xohOV`AkVN5x6cA<UxC"
  secret.key = ${?APPLICATION_SECRET}
  requestHandler = "pdgconf.UrlDecryptRequestHandler"
}

# Server configuration - Modern runs on port 9001 (legacy uses 9000)
play.server.http.port = 9001

# Database configuration (shared with legacy)
slick.dbs.default {
  profile = "slick.jdbc.PostgresProfile$"
  db {
    driver = "org.postgresql.Driver"
    url = "jdbc:postgresql://localhost:5432/genisdb"
    user = "genissqladmin"
    password = "genissqladminp"
    numThreads = 10
    maxConnections = 10
  }
}

# Separate database for audit logs (legacy "logDb" — genislogdb)
slick.dbs.logDb {
  profile = "slick.jdbc.PostgresProfile$"
  db {
    driver = "org.postgresql.Driver"
    url = "jdbc:postgresql://localhost:5432/genislogdb"
    url = ${?LOG_DB_URL}
    user = "genissqladmin"
    user = ${?LOG_DB_USER}
    password = "genissqladminp"
    password = ${?LOG_DB_PASSWORD}
    numThreads = 5
    maxConnections = 5
  }
}

# MongoDB — sin auth (genis_mongo dev container). Override with MONGODB_URI env var in production.
mongodb {
  uri = "mongodb://localhost:27017/pdgdb"
  uri = ${?MONGODB_URI}
  database = "pdgdb"
}

# Application info
application {
  name = "GENis Core"
  version = "5.2.0-SNAPSHOT"
  scala = "3.3.1"
  play = "3.0.6"
}

# Security configuration
rsa.keyLength = 1024
token.expirationTime = 60
credentials.expirationTime = 3600

# OTP (One-Time Password) configuration
otp {
  interval = 30
  futures = 1
  pasts = 1
}

# Guice modules
play.modules.enabled += "play.api.cache.caffeine.CaffeineCacheModule"
play.modules.enabled += "security.SecurityModule"
play.modules.enabled += "user.UsersModule"
play.modules.enabled += "modules.core.CoreModule"
play.modules.enabled += "disclaimer.DisclaimerModule"
play.modules.enabled += "configdata.Module"
play.modules.enabled += "kits.StrKitModule"
play.modules.enabled += "motive.MotiveModule"
play.modules.enabled += "profile.ProfileModule"
play.modules.enabled += "trace.TraceModule"

play.modules.enabled += "audit.OperationLogModule"
play.modules.enabled += "inbox.NotificationModule"
play.modules.enabled += "scenarios.ScenarioModule"
play.modules.enabled += "probability.ProbabilityModule"
play.modules.enabled += "bulkupload.BulkUploadModule"
play.modules.enabled += "profiledata.ProfileDataModule"
play.modules.enabled += "pedigree.MutationModule"
play.modules.enabled += "pedigree.PedigreeModule"
play.modules.enabled += "matching.MatchingModule"

# Dedicated dispatcher for CPU-intensive LR calculations (migrated from legacy conf/akka.conf)
pekko.actor.lrmix-context {
  type = Dispatcher
  executor = "fork-join-executor"
  fork-join-executor {
    parallelism-factor = 20.0
    parallelism-min = 30
    parallelism-max = 300
  }
}

# Dedicated dispatcher for blocking MongoDB sync driver I/O (pedigree matching).
# The mongodb-driver-sync driver is blocking — running it on the default Pekko
# dispatcher (which also runs HTTP request handlers) risks thread-pool starvation
# under load. Bundle C migration kept the sync driver for fidelity with legacy;
# this dispatcher isolates the blocking work.
pekko.actor.mongo-blocking-dispatcher {
  type = Dispatcher
  executor = "thread-pool-executor"
  thread-pool-executor {
    fixed-pool-size = 16
  }
  throughput = 1
}

calculation {
  lrmix = Autosomal
  mixmix = Autosomal
  pedigree = Autosomal
}

# Mutation model defaults (mirrors legacy genis-misc.conf mt.* keys)
mt {
  regions {
    HV1 = [16023, 16428]
    HV2 = [50, 340]
    HV3 = [341, 600]
    HV4 = [0, 99999]
  }
  ignore = [16193, 309, 455, 463, 573]
  defaultMutationRateI            = "0.001628"
  defaultMutationRateF            = "0.000463"
  defaultMutationRateM            = "0.001584"
  defaultMutationRange            = "0.5"
  defaultMutationRateMicrovariant = "0.0000005"
}

# HTTP filters
play.filters.enabled += "audit.OperationLogFilter"
play.filters.enabled += "pdgconf.BackendIdentityFilter"
play.filters.enabled += "pdgconf.BodyDecryptFilter"

# CSRF no aplica a esta REST API JSON: toda autenticación usa session token + TOTP por operación sensible.
# Las peticiones cross-site con JSON no son posibles sin CORS habilitado (que no está).
play.filters.disabled += "play.filters.csrf.CSRFFilter"

# Operation log configuration — flat keys match legacy storage.conf (authoritative).
# `hmac.algorithm` is deliberately NOT a runtime setting: Signature hardcodes HmacSHA256
# (changing it would invalidate every prior signature in genislogdb).
random.algorithm  = SHA1PRNG
lot.size          = 10000
chunk.size        = 100

# Prefixed keys are only a fallback for new installs that never had legacy flat keys.
operationLog {
  build.number    = "develop"
  build.number    = ${?BUILD_NUMBER}
}

# Bounded mailbox for PEOSignerActor. Caps the audit queue so overload fails fast
# instead of growing memory unbounded — mirrors legacy Akka BoundedMessageQueueSemantics.
pekko.actor.mailbox.requirements {
  "org.apache.pekko.dispatch.BoundedMessageQueueSemantics" = bounded-mailbox
}
bounded-mailbox {
  mailbox-type     = "org.apache.pekko.dispatch.BoundedMailbox"
  mailbox-capacity = 1000
  # 0 = fail-fast on overflow (non-blocking). Non-zero blocks the sender and
  # Pekko logs a warning about potentially-blocking mailboxes.
  mailbox-push-timeout-time = 0
}

# Dedicated dispatcher for PEOSignerActor. The actor is intentionally blocking —
# it uses Await.result on DB writes inside receive to preserve the signature chain
# ordering — so it must not share the default Pekko dispatcher (which runs HTTP
# request handlers). Mirrors legacy `play.akka.actor.log-context`.
audit-dispatcher {
  type = "Dispatcher"
  executor = "thread-pool-executor"
  thread-pool-executor {
    fixed-pool-size = 2
  }
  throughput = 1
}



# Labels configuration (used by ProfileModule)
labels {
  set1 = {
    1 = {
      id = 1
      caption = Víctima
    }
    2 = {
      id = 2
      caption = Otro
    }
  }
  set2 = {
    3 = {
      id = 3
      caption = Individuo1
    }
    4 = {
      id = 4
      caption = Individuo2
    }
  }
}

# Profile export
exportProfilesPageSize = 1000
exportProfilesPath = "./public/export/profiles/"

# LIMS files export
generateLimsFiles = true
limsArchivesPath = "./public/export/lims"

# Laboratory (overwritten on installation)
laboratory {
  country = "AR"
  province = "C"
  code = "SHDG"
}

protoprofile.globalCode.dummy = "XX-X-XXXX-"


# LDAP Configuration
ldap.default {
  url = "localhost"
  url = ${?LDAP_URL}

  port = 1389
  port = ${?LDAP_PORT}

  bindingPool.size = 10

  bindDn = "cn=admin,dc =genis,dc=local"
  bindDn = ${?LDAP_BIND_DN}

  bindPassword = "adminp"
  bindPassword = ${?LDAP_BIND_PASSWORD}

  usersDn = "ou=Users,dc=genis,dc=local"
  usersDn = ${?LDAP_USERS_DN}

  rolesDn = "ou=Roles,dc=genis,dc=local"
  rolesDn = ${?LDAP_ROLES_DN}
}

