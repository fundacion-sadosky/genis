# Application configuration for Core module

# This is the main configuration file for the Core application (Scala 3 + Play 3).
# It uses HOCON format

# Play HTTP settings
play.http {
  secret.key = "changeme"
  secret.key = ${?APPLICATION_SECRET}
}

# Database configuration (shared with legacy)
slick.dbs.default {
  profile = "slick.jdbc.PostgresProfile$"
  db {
    driver = "org.postgresql.Driver"
    url = "jdbc:postgresql://localhost:5432/genisdb"
    user = "genis"
    password = "genis"
    numThreads = 10
    maxConnections = 10
  }
}

# FerretDB (MongoDB replacement)
mongodb {
  uri = "mongodb://localhost:27019"
  database = "genis"
}

# Application info
application {
  name = "GENis Core"
  version = "5.2.0-SNAPSHOT"
  scala = "3.3.1"
  play = "3.0.6"
}

# Security configuration
rsa.keyLength = 1024
token.expirationTime = 60
credentials.expirationTime = 3600

# OTP (One-Time Password) configuration
otp {
  interval = 30
  futures = 1
  pasts = 1
}

# Guice modules
play.modules.enabled += "security.SecurityModule"
play.modules.enabled += "user.UsersModule"

# LDAP Configuration
ldap.default {
  url = "localhost"
  url = ${?LDAP_URL}

  port = 1389
  port = ${?LDAP_PORT}

  bindingPool.size = 10

  usersDn = "ou=Users,dc=genis,dc=local"
  usersDn = ${?LDAP_USERS_DN}

  rolesDn = "ou=Roles,dc=genis,dc=local"
  rolesDn = ${?LDAP_ROLES_DN}
}
