rsa.keyLength = 1024
token.expirationTime = 3
credentials.expirationTime = 3

otp {
  interval = 30
  futures = 1
  pasts = 1
}

ldap.default {
  url = "localhost"
  port = 1389
  bindingPool.size = 2
  usersDn = "ou=Users,dc=genis,dc=local"
  rolesDn = "ou=Roles,dc=genis,dc=local"
}

play.http.secret.key = "test-secret-key-for-testing-only"

# Base de datos para tests de integración (requiere genis_postgres arriba).
slick.dbs.default {
  profile = "slick.jdbc.PostgresProfile$"
  db {
    driver = "org.postgresql.Driver"
    url = "jdbc:postgresql://localhost:5432/genisdb"
    user = "genissqladmin"
    password = "genissqladminp"
    numThreads = 4
    maxConnections = 4
  }
}

# Dispatcher dedicado para el I/O bloqueante de LDAP (ver user.LdapExecutionContext).
ldap-context {
  executor = "thread-pool-executor"
  type = Dispatcher
  thread-pool-executor {
    fixed-pool-size = 4
  }
  throughput = 1
}
