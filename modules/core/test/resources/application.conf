rsa.keyLength = 1024
token.expirationTime = 3
credentials.expirationTime = 3

otp {
  interval = 30
  futures = 1
  pasts = 1
}

ldap.default {
  url = "localhost"
  port = 1389
  bindingPool.size = 2
  usersDn = "ou=Users,dc=genis,dc=local"
  rolesDn = "ou=Roles,dc=genis,dc=local"
}

play.http.secret.key = "test-secret-key-for-testing-only"

# Audit module opens a JDBC pool against genislogdb and the filter fires for every
# FakeRequest — neither is available in unit/controller tests. Disable the real module
# and filter; a stub OperationLogService is provided by fixtures.StubAuditModule so
# the routes wiring still resolves.
play.modules.disabled += "audit.OperationLogModule"
play.modules.enabled  += "fixtures.StubAuditModule"
play.filters.disabled += "audit.OperationLogFilter"
play.modules.disabled += "pedigree.PedigreeModule"
play.modules.disabled += "pedigree.MutationModule"
play.modules.enabled  += "fixtures.StubPedigreeModule"
