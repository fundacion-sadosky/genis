include "play.conf"
include "genis-misc.conf"
include "storage.conf"
include "interconnect.conf"
include "akka.conf"

# Play Framework configuration
play {
  # Application loader - required for Play 3.0+
  application.loader = "modules.ApplicationModule"
  
  # Server configuration
  server {
    provider = "play.core.server.PekkoHttpServerProvider"
    http.port = 9000
  }
  
  # HTTP configuration
  http {
    secret.key = "changeme"
  }
}

# Database configuration (PostgreSQL)
db {
  postgresql {
    driver = "org.postgresql.Driver"
    url = "jdbc:postgresql://localhost:5432/genis"
    url = ${?DATABASE_URL}
    username = "postgres"
    username = ${?DB_USER}
    password = "postgres"
    password = ${?DB_PASSWORD}
  }
}

# JWT Configuration
jwt {
  secret = "your-secret-key-change-me"
  secret = ${?JWT_SECRET}
  expiration = 24
}

# LDAP Configuration
ldap {
  server = "ldap://localhost"
  server = ${?LDAP_SERVER}
  port = 389
  port = ${?LDAP_PORT}
  baseDn = "dc=example,dc=com"
  baseDn = ${?LDAP_BASE_DN}
}





