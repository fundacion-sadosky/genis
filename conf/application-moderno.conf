# =============================================================================
# CONFIGURACIÓN DE GENIS 6.0 - ENTORNO DE DESARROLLO MODERNO
# =============================================================================
# Basado en: application.conf de Play Framework 3.x

play.application.loader = "play.inject.guice.GuiceApplicationLoader"
play.modules.enabled += "modules.LdapModule"

# ========================================
# PLAY FRAMEWORK
# ========================================
# play.server.provider = play.core.server.NettyServerProvider
# play.server.netty.transport = "jio"

# =============================================================================
# JDBC & DATABASE - PostgreSQL
# =============================================================================

slick.dbs.default.profile = "slick.jdbc.PostgresProfile$"
slick.dbs.default.db.driver = "org.postgresql.Driver"
slick.dbs.default.db.url = "jdbc:postgresql://localhost:5432/genisdb"
slick.dbs.default.db.url = ${?DATABASE_URL}
slick.dbs.default.db.user = "genissqladmin"
slick.dbs.default.db.user = ${?DATABASE_USER}
slick.dbs.default.db.password = "genissqladminp"
slick.dbs.default.db.password = ${?DATABASE_PASSWORD}

# Connection Pool
slick.dbs.default.db.numThreads = 10
slick.dbs.default.db.maxConnections = 20
slick.dbs.default.db.minConnections = 2

# =============================================================================
# LOG DB - Base de datos de auditoría
# =============================================================================

slick.dbs.logDb.profile = "slick.jdbc.PostgresProfile$"
slick.dbs.logDb.db.driver = "org.postgresql.Driver"
slick.dbs.logDb.db.url = "jdbc:postgresql://localhost:5432/genislogdb"
slick.dbs.logDb.db.url = ${?LOG_DATABASE_URL}
slick.dbs.logDb.db.user = "genissqladmin"
slick.dbs.logDb.db.user = ${?LOG_DATABASE_USER}
slick.dbs.logDb.db.password = "genissqladminp"
slick.dbs.logDb.db.password = ${?LOG_DATABASE_PASSWORD}

slick.dbs.logDb.db.numThreads = 5
slick.dbs.logDb.db.maxConnections = 10

# =============================================================================
# EVOLUTIONS - Database Migrations
# =============================================================================

play.evolutions.enabled = true
play.evolutions.autoApply = false
play.evolutions.autoApplyDowns = false
play.evolutions.db.default.enabled = true
play.evolutions.db.logDb.enabled = true

# =============================================================================
# LDAP - Autenticación Corporativa
# =============================================================================

ldap {
  enabled = true
  provider_url = "ldap://localhost:1389"
  base_dn = "dc=genis,dc=local"
  admin_dn = "cn=admin,dc=genis,dc=local"
  admin_password = "adminp"
  user_dn_pattern = "uid={0},ou=people,dc=genis,dc=local"
  group_search_base = "ou=groups,dc=genis,dc=local"
  connection_timeout = 5000
  read_timeout = 5000
}

# =============================================================================
# SEGURIDAD
# =============================================================================

# JWT Configuration
jwt {
  secret = "CAMBIAR_EN_PRODUCCION_A_VALOR_SEGURO_128_CARACTERES_MINIMO"
  expiration = 86400  # 24 horas en segundos
}

# HTTPS & Security
play.filters.https {
  redirectHttps = false
}

play.filters.headers {
  contentSecurityPolicy = "default-src 'self' 'unsafe-inline' 'unsafe-eval'"
  permittedCrossDomainPolicies = "all"
}

play.filters.enabled = ["play.filters.headers.SecurityHeadersFilter"]

# =============================================================================
# EXPORTACIÓN DE ARCHIVOS
# =============================================================================

app {
  files {
    export_path = "/var/genis/exports"
    lims_path = "/var/genis/lims"
    temp_path = "/tmp/genis"
    max_upload_size = 104857600  # 100 MB en bytes
  }
  
  # Configuración de la aplicación
  laboratory {
    name = "Laboratorio de Análisis"
    code = "LAB001"
  }
}

# =============================================================================
# LOGGING - Logback
# =============================================================================

play.logger.default = "WARN"

logger.play = "INFO"
logger.application = "DEBUG"
logger.slick.jdbc = "DEBUG"
logger.slick.jdbc.JdbcBackend.statement = "DEBUG"

# =============================================================================
# TIMEOUTS
# =============================================================================

# play.server.provider = play.core.server.NettyServerProvider
# play.server.netty.maxChunkSize = 1048576  # 1MB

play.ws.timeout.connection = 120000  # 2 minutos
play.ws.timeout.idle = 120000
play.ws.timeout.request = 120000

# =============================================================================
# PORTS
# =============================================================================

http.port = 9000
# https.port = 9443

# =============================================================================
# AKKA
# =============================================================================

akka {
  loggers = ["akka.event.slf4j.Slf4jLogger"]
  loglevel = "DEBUG"
  logging-filter = "akka.event.slf4j.Slf4jLoggingFilter"
}
