include "application.conf"

# Clave para el módulo core en desarrollo local (este archivo es gitignoreado).
# NO usar en producción — setear APPLICATION_SECRET como variable de entorno.
play.http.secret.key = "genis-core-dev-only-not-for-production"

# overwrites conf/storage.conf

# LDAP 
ldap {
  default {
    url = "localhost"
    adminDn = "cn=admin,dc=genis,dc=local"
    port = 1389
    adminPassword="adminp"
  }
}

# Pgsql
db {
  default {
    url = "jdbc:postgresql://localhost:5432/genisdb"
    user = "genissqladmin"
    password = "genissqladminp"
  }  
  logDb {
    url = "jdbc:postgresql://localhost:5432/genislogdb"
    user= "genissqladmin"
    password = "genissqladminp"
  }
}

# MongoDB — sin auth (genis_mongo dev container). Override with MONGODB_URI env var in production.
mongodb {
  uri = "mongodb://localhost:27017/pdgdb"
  uri = ${?MONGODB_URI}
  database = "pdgdb"
}
# overwrites conf/genis-misc.conf

# the laboratory that owns the system must be defined for instance, Servicio de Huellas Digitales Genéticas 
laboratory {
  country = AR
  province = C
  code = SHDG
}

# exports
exportProfilesPath="/home/genis-user/profiles/"
limsArchivesPath = "/home/genis-user/LIMSFiles"

# overwrites conf/interconnect.conf

instanceInterconnection {
  # local url
  protocol="http://"
  localUrl="192.168.5.218:9000"
  retryInterval = "300 seconds"
}
# local admin user
defaultAssignee = "setup"

# BulkUpload
protoprofile.globalCode.dummy = "XX-X-XXXX-"
